services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dtp_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/dtp_db
      SECRET_KEY: change-me-in-production-please
      CORS_ORIGINS: '["http://localhost","http://localhost:8081"]'
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_YANDEX_MAPS_KEY: ${VITE_YANDEX_MAPS_KEY:-}
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  postgres_data:
